server:
  port: 8000

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800
  jwt-secret-key: ${JWT_SECRET:your-jwt-secret-here-must-be-32-chars-long}
  is-read-header: true
  is-read-cookie: false
  is-print: false

spring:
  application:
    name: cdm-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8010
          predicates:
            - Path=/api/v1/auth/**
