server:
  port: 8000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8010
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/organizations/**
        - id: agent-service
          uri: http://localhost:8020
          predicates:
            - Path=/api/v1/chat/**, /api/v1/documents/**, /api/v1/kb/**

sa-token:
  jwt-secret-key: ${JWT_SECRET}
  token-name: Authorization
  token-prefix: "Bearer "
  is-read-header: true
  is-read-cookie: false
