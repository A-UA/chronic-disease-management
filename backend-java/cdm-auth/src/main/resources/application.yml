server:
  port: 8011

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800
  jwt-secret-key: ${JWT_SECRET:your-jwt-secret-here-must-be-32-chars-long}
  is-read-header: true
  is-read-cookie: false
  is-print: false

spring:
  application:
    name: cdm-auth
  config:
    import:
      - optional:nacos:cdm-auth.yml?group=CDM_GROUP&refresh=true
      - optional:nacos:cdm-common.yml?group=CDM_GROUP&refresh=true
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: CDM_GROUP
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: CDM_GROUP
        file-extension: yml
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_saas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
